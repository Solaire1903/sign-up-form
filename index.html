<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="sidebar">
    <img src="images/purple-flowers.jpg" alt="Purple flowers in full bloom">
    <div class="logo-banner">
      <img src="images/odin-lined.png" alt="Icon of a norse man">
      <p>ODIN</p>
    </div>
    <p>Photo by <a href="https://unsplash.com/de/@paper_butterfly">Paper Butterfly</a> on <a
        href="https://unsplash.com/">Unsplash</a></p>
  </div>

  <div class="main-page">
    <div>
      <p>This is not a real online service! You know you need something like this
        in your life to help you realize your deepest dreams.
        <br>
        Sign up <i>now</i> to get started.
        <br>
        <br>
        You <i>know</i> you want to.
      </p>
    </div>
    <div>
      <p>Let's do this!</p>
      <form action="" method="get" id="registration">
        <div>
          <label for="first_name">FIRST NAME*</label>
          <input type="text" name="first_name" id="first_name" required>
        </div>

        <div>
          <label for="last_name">LAST NAME*</label>
          <input type="text" name="last_name" id="last_name" required>
        </div>

        <div>
          <label for="email">EMAIL*</label>
          <input type="email" name="email" id="email" required>
        </div>

        <div>
          <label for="phone_number">PHONE NUMBER</label>
          <input type="number" name="phone_number" id="phone_number">
        </div>

        <div>
          <label for="password">PASSWORD*</label>
          <input type="password" name="password" id="password" required>
        </div>

        <div>
          <label for="password_confirmation">CONFIRM PASSWORD*</label>
          <input type="password" name="confirmed_password" id="password_confirmation" required>
        </div>

      </form>
    </div>
    <div>
      <button type="submit" form="registration">Create Account</button>
      <p>Already have an account? <a href="">Log in</p>
    </div>
  </div>
</body>

</html>
